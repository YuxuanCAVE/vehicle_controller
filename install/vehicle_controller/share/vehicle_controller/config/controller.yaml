vehicle_controller:
  ros__parameters:
    odom_topic: "/ins/odometry"
    imu_topic: "/ins/imu"
    command_topic: "/command"
    enable_topic: "/enable"
    controller:
      lateral: "mpc"
      longitudinal: "lqr"

    sim:
      dt: 0.10
      progress_window: 80

    ref:
      path_file: "/home/yuxuan/ros_ws/src/vehicle_controller/data/path_ref.mat"

    speed:
      mode: "profile"
      constant_value: 10.0
      profile: "referencePath_Velocity_peak_velocity_3"

    accel_limits:
      a_max: 3.372
      a_min: -7.357

    mpc_combined:
      N: 25
      Q: [15.0, 12.0, 8.0, 10.0, 8.0, 20.0]
      R: [5.0, 0.5]
      Rd: [15.0, 2.0]
      kappa_ff_gain: 0.5
      max_steer: 0.6108652382
      a_min: -7.357
      a_max: 3.372

    mpc:
      N: 25
      Q: [15.0, 12.0, 8.0, 10.0]
      R: 5.0
      Rd: 15.0
      kappa_ff_gain: 0.5
      max_steer: 0.6108652382

    lon_lqr:
      Q: [20.0, 10.0]
      R: 0.4
      a_min: -7.357
      a_max: 3.372
      int_error_min: -10.0
      int_error_max: 10.0

    timing:
      dt_min: 0.05
      dt_max: 0.10
      min_control_period: 0.10

    recorder:
      enabled: true
      output_dir: ""
      file_prefix: "vehicle_record"
