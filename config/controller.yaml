vehicle_controller:
  ros__parameters:
    odom_topic: "/ins/odometry"
    imu_topic: "/ins/imu"
    command_topic: "/command"
    enable_topic: "/enable"
    record_topic: "/controller_record"
    sygnal_state_topic: "/sygnal_state"
    sygnal_fault_topic: "/sygnal_fault"

    controller.lateral: "nmpc_kbm"
    controller.longitudinal: "pid"

    sim.dt: 0.10
    sim.progress_window: 5

    ref.path_file: "data/path_ref.mat"

    speed.mode: "profile"
    speed.constant_value: 3.0
    speed.profile: "3"
    speed.smoothing_enabled: true
    speed.smoothing_accel_scale: 0.85
    speed.initial_smoothed_value: 0.5

    accel_limits.a_max: 3.372
    accel_limits.a_min: -7.357

    nmpc_kbm.N: 5
    nmpc_kbm.q_x: 32.0
    nmpc_kbm.q_y: 32.0
    nmpc_kbm.q_psi: 4.0
    nmpc_kbm.r_delta: 64.0
    nmpc_kbm.r_du: 64.0
    nmpc_kbm.max_iterations: 100
    nmpc_kbm.max_fun_evals: 4000

    lon_pid.kp: 1.6
    lon_pid.ki: 0.0
    lon_pid.kd: 0.0
    lon_pid.a_min: -7.357
    lon_pid.a_max: 3.372
    lon_pid.int_error_min: -10.0
    lon_pid.int_error_max: 10.0

    timing.dt_min: 0.01
    timing.dt_max: 0.20
    timing.min_control_period: 0.10

    end_condition.max_lateral_error: 7.0
    end_condition.max_longitudinal_error: 7.0
    end_condition.goal_index_margin: 3
    end_condition.goal_lateral_error: 2.0
    end_condition.goal_longitudinal_error: 2.0
    end_condition.goal_heading_error: 0.0872664626
    end_condition.goal_speed_threshold: 2.0
